# Site settings
title: Christopher Zechen Chen # site title
description: >- # site description
  Personal blog and digital journal of Christopher Zechen Chen. 
lang: en-US # default lang
timezone: America/Los_Angeles # set your timezone
image: /assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/c-z-chen/blog # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Christopher Zechen Chen # author name
  bio: >- # tell to the world
    a personal blog.
  username: czchen # general username
  github: c-z-chen # github username
  twitter: twitter_username # twitter username
  facebook: facebook_username # facebook username
  email: czchen@berkeley.edu # email adress
  avatar: /assets/img/avatar.jpg # change with your own avatar

# URL settings
url: "https://www.ocf.berkeley.edu"
baseurl: "/~czchen"
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - node_modules
  - klise-*.gem

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
